services:
  postgres:
    image: postgres:16-alpine
    container_name: ato-postgres
    environment:
      POSTGRES_USER: ato
      POSTGRES_PASSWORD: ato_dev_password
      POSTGRES_DB: ato
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ato -d ato"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
