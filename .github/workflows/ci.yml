name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ato/shared run build
      - run: pnpm run lint
      - run: pnpm run typecheck

  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  unit-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ato/shared run build
      - run: pnpm --filter @ato/backend run test:unit

  integration-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ato/shared run build
      - run: pnpm --filter @ato/backend run test:integration

  e2e:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ato/shared run build
      - run: pnpm --filter @ato/web exec playwright install chromium --with-deps
      # wrangler用の.dev.varsを生成（改行を\nリテラルに変換）
      - name: Create backend .dev.vars
        env:
          DEV_USER_EMAIL: ${{ secrets.DEV_USER_EMAIL }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "DEV_USER_EMAIL=${DEV_USER_EMAIL}" > apps/backend/.dev.vars
          echo "DATABASE_URL=${DATABASE_URL}" >> apps/backend/.dev.vars
          ESCAPED_PRIVATE_KEY=$(printf '%s' "${JWT_PRIVATE_KEY}" | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          ESCAPED_PUBLIC_KEY=$(printf '%s' "${JWT_PUBLIC_KEY}" | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          printf 'JWT_PRIVATE_KEY="%s"\n' "${ESCAPED_PRIVATE_KEY}" >> apps/backend/.dev.vars
          printf 'JWT_PUBLIC_KEY="%s"\n' "${ESCAPED_PUBLIC_KEY}" >> apps/backend/.dev.vars
      - run: pnpm --filter @ato/web run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/web/playwright-report/
          retention-days: 7
